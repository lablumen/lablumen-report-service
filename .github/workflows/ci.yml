name: ci

# Trunk-based. PR -> gate (lint/test/Sonar/Snyk/Trivy). Merge to main -> build :sha, push to ECR,
# write the SHA into lablumen-k8s values-dev.yaml -> ArgoCD deploys to DEV.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: lablumen/lablumen-shared/.github/workflows/service-pr.yml@main
    with:
      service-name: report-service
      service-path: .
      sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy-dev:
    if: ${{ github.event_name == 'push' }}
    uses: lablumen/lablumen-shared/.github/workflows/service-build-push.yml@main
    with:
      service-name: report-service
      service-path: .
      ecr-repository: lablumen/report-service
      role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-app-ci-ecr
    secrets:
      K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}
